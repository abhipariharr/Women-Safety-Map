<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Women's Safety Map - Pune</title>

    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Leaflet CSS -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">

    <!-- Leaflet.heat CSS (for heatmap) -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet.heat@0.2.0/dist/leaflet-heat.css">

    <style>
        #map {
            height: 600px;
            width: 100%;
            border-radius: 8px;
        }
        .legend {
            background: white;
            padding: 10px;
            border-radius: 5px;
            box-shadow: 0 0 10px rgba(0,0,0,0.2);
        }
        .crime-type-badge {
            cursor: pointer;
            transition: all 0.2s;
        }
        .crime-type-badge:hover {
            transform: scale(1.05);
        }
        .search-highlight {
            background-color: #fff3cd;
        }
    </style>
</head>
<body>
    <!-- Navbar -->
    <nav class="navbar navbar-expand-lg navbar-dark bg-primary">
        <div class="container-fluid">
            <a class="navbar-brand" href="#">
                <strong> Pune Women's Safety Map</strong>
            </a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item">
                        <span class="nav-link text-white">Data: 2023 | NCRB</span>
                    </li>
                </ul>
            </div>
        </div>
    </nav>

    <!-- Main Content -->
    <div class="container-fluid mt-4">
        <div class="row">
            <!-- Sidebar Controls -->
            <div class="col-md-3">
                <!-- Search Box -->
                <div class="card mb-3">
                    <div class="card-header bg-primary text-white">
                        <h6 class="mb-0">Search Area</h6>
                    </div>
                    <div class="card-body">
                        <input type="text" id="searchInput" class="form-control"
                               placeholder="e.g., Hinjewadi, Kothrud...">
                        <div id="searchResults" class="mt-2"></div>
                    </div>
                </div>

                <!-- Crime Type Filter -->
                <div class="card mb-3">
                    <div class="card-header bg-primary text-white">
                        <h6 class="mb-0">Filter by Crime Type</h6>
                    </div>
                    <div class="card-body">
                        <div class="form-check">
                            <input class="form-check-input crime-filter" type="checkbox" value="all" id="filterAll" checked>
                            <label class="form-check-label" for="filterAll">All Crimes</label>
                        </div>
                        <div class="form-check">
                            <input class="form-check-input crime-filter" type="checkbox" value="harassment" id="filterHarassment">
                            <label class="form-check-label" for="filterHarassment">
                                <span class="badge bg-danger">Harassment</span>
                            </label>
                        </div>
                        <div class="form-check">
                            <input class="form-check-input crime-filter" type="checkbox" value="assault" id="filterAssault">
                            <label class="form-check-label" for="filterAssault">
                                <span class="badge bg-warning text-dark">Assault</span>
                            </label>
                        </div>
                        <div class="form-check">
                            <input class="form-check-input crime-filter" type="checkbox" value="stalking" id="filterStalking">
                            <label class="form-check-label" for="filterStalking">
                                <span class="badge bg-info">Stalking</span>
                            </label>
                        </div>
                        <div class="form-check">
                            <input class="form-check-input crime-filter" type="checkbox" value="domestic_violence" id="filterDomestic">
                            <label class="form-check-label" for="filterDomestic">
                                <span class="badge bg-secondary">Domestic Violence</span>
                            </label>
                        </div>
                    </div>
                </div>

                <!-- Legend -->
                <div class="card">
                    <div class="card-header bg-primary text-white">
                        <h6 class="mb-0">Safety Level</h6>
                    </div>
                    <div class="card-body">
                        <div class="legend">
                            <div class="d-flex align-items-center mb-2">
                                <span style="background: #ff0000; width: 20px; height: 20px; display: inline-block; border-radius: 50%;"></span>
                                <span class="ms-2">High Risk (Red)</span>
                            </div>
                            <div class="d-flex align-items-center mb-2">
                                <span style="background: #ffff00; width: 20px; height: 20px; display: inline-block; border-radius: 50%;"></span>
                                <span class="ms-2">Moderate (Yellow)</span>
                            </div>
                            <div class="d-flex align-items-center">
                                <span style="background: #00ff00; width: 20px; height: 20px; display: inline-block; border-radius: 50%;"></span>
                                <span class="ms-2">Safer (Green)</span>
                            </div>
                        </div>
                    </div>
                </div>
            </div>

            <!-- Map Area -->
            <div class="col-md-9">
                <div id="map"></div>

                <!-- Stats Summary -->
                <div class="row mt-3">
                    <div class="col-md-3">
                        <div class="card text-center bg-danger text-white">
                            <div class="card-body">
                                <h4 id="totalCrimes">0</h4>
                                <p class="mb-0">Total Incidents</p>
                            </div>
                        </div>
                    </div>
                    <div class="col-md-3">
                        <div class="card text-center bg-warning text-dark">
                            <div class="card-body">
                                <h4 id="totalAreas">0</h4>
                                <p class="mb-0">Areas Covered</p>
                            </div>
                        </div>
                    </div>
                    <div class="col-md-3">
                        <div class="card text-center bg-success text-white">
                            <div class="card-body">
                                <h4 id="highestRisk">-</h4>
                                <p class="mb-0">Highest Risk Area</p>
                            </div>
                        </div>
                    </div>
                    <div class="col-md-3">
                        <div class="card text-center bg-info text-white">
                            <div class="card-body">
                                <h4 id="mostCommon">-</h4>
                                <p class="mb-0">Most Common Crime</p>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Footer -->
    <footer class="mt-5 py-3 bg-light text-center">
        <p class="text-muted mb-0">
            Data Source: NCRB, Pune Police | For awareness purposes only
        </p>
    </footer>

    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

    <!-- Leaflet JS -->
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

    <!-- Leaflet.heat plugin -->
    <script src="https://unpkg.com/leaflet.heat@0.2.0/dist/leaflet-heat.js"></script>

    <!-- Main Script -->
    <script src="script.js"></script>
</body>
</html>
